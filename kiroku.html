<!DOCTYPE html>
<html lang="ja">
<head>

<title>24時間連絡体制 記録</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Hiragino Sans','Noto Sans JP',sans-serif;background:#f0f4f8;min-height:100vh;padding-bottom:80px;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;}
  .header{background:linear-gradient(135deg,#0a1628 0%,#0d3b7a 100%);color:#fff;padding:20px 16px 14px;border-radius:0 0 20px 20px;margin-bottom:14px;box-shadow:0 6px 28px rgba(13,59,122,.4);}
  .header-title{font-size:18px;font-weight:900;letter-spacing:.3px;}
  .header-sub{font-size:10px;opacity:.6;margin-top:2px;}
  .header-label{font-size:10px;letter-spacing:3px;opacity:.55;margin-bottom:2px;}
  .month-nav{display:flex;align-items:center;gap:10px;margin:10px 0;}
  .month-nav span{font-size:17px;font-weight:900;min-width:100px;text-align:center;}
  .nav-btn{background:rgba(255,255,255,.18);border:none;color:#fff;width:32px;height:32px;border-radius:10px;font-size:20px;display:flex;align-items:center;justify-content:center;}

  .stat-badge{background:rgba(255,255,255,.12);border-radius:10px;padding:5px 12px;font-size:11px;}

  .tab-btn.active{background:#0d3b7a;color:#fff;box-shadow:0 4px 14px rgba(13,59,122,.4);}
  .tab-btn.inactive{background:#fff;color:#64748b;box-shadow:0 1px 4px rgba(0,0,0,.06);}
  .day-card{background:#fff;border-radius:14px;margin-bottom:8px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.06);}
  .day-card.no-call{border:1.5px solid #d1fae5;}
  .day-card.has-call{border:1.5px solid #f59e0b;}
  .day-card.unrecorded{border:1.5px solid #e2e8f0;}
  .day-card.today{border:2px solid #0d3b7a;box-shadow:0 4px 20px rgba(13,59,122,.15);}
  .day-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid #f1f5f9;cursor:pointer;}
  .day-num{font-size:20px;font-weight:900;}

  .day-num.sat{color:#2563eb;}

  .day-num.today-num{color:#0d3b7a;}
  .day-wd{font-size:11px;font-weight:700;margin-left:2px;}
  .today-badge{font-size:9px;background:#0d3b7a;color:#fff;padding:1px 5px;border-radius:6px;font-weight:700;margin-left:4px;}
  .call-btn{padding:4px 10px;border-radius:8px;border:none;font-size:11px;font-weight:700;transition:all .15s;}
  .call-btn.none-active{background:#d1fae5;color:#059669;}
  .call-btn.none-inactive{background:#f1f5f9;color:#94a3b8;}
  .call-btn.yes-active{background:#fef3c7;color:#d97706;}
  .call-btn.yes-inactive{background:#f1f5f9;color:#94a3b8;}
  .duty-select{font-size:11px;border:1px solid #e2e8f0;border-radius:8px;padding:3px 6px;background:#f8fafc;color:#374151;outline:none;max-width:110px;}
  .call-badge{background:#f59e0b;color:#fff;font-size:11px;font-weight:900;border-radius:20px;padding:2px 8px;}
  .expand-arrow{color:#94a3b8;font-size:12px;}
  .day-expand{padding:10px 14px;}
  .rec-card{background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:10px 12px;margin-bottom:8px;}
  .rec-time{font-size:15px;font-weight:900;color:#0a1628;}
  .rec-staff{font-size:11px;background:#0d3b7a;color:#fff;padding:2px 8px;border-radius:12px;font-weight:700;}
  .rec-label{font-weight:700;}
  .rec-content-label{color:#92400e;}
  .rec-response-label{color:#0d3b7a;}
  .rec-memo{font-size:11px;color:#64748b;background:#f8fafc;border-radius:6px;padding:4px 8px;margin-top:4px;}
  .rec-meta{font-size:9px;color:#94a3b8;margin-top:5px;}

  .add-rec-btn{width:100%;padding:10px 0;background:linear-gradient(135deg,#0a1628,#0d3b7a);color:#fff;border:none;border-radius:10px;font-weight:700;font-size:13px;margin-top:4px;}

  .staff-add-btn{width:100%;padding:11px 0;background:#f1f5f9;color:#0d3b7a;border:2px dashed #cbd5e1;border-radius:10px;font-weight:700;font-size:13px;margin-top:4px;}
  .staff-save-btn{width:100%;padding:11px 0;background:linear-gradient(135deg,#0a1628,#0d3b7a);color:#fff;border:none;border-radius:10px;font-weight:700;font-size:14px;margin-top:10px;}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:flex-end;justify-content:center;z-index:200;}
  .modal-box{background:#fff;border-radius:24px 24px 0 0;padding:20px 20px 36px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,.25);}
  .modal-handle{width:40px;height:4px;background:#e2e8f0;border-radius:2px;margin:0 auto 16px;}
  .modal-title{font-weight:900;font-size:16px;color:#0a1628;margin-bottom:16px;}
  .modal-label{font-size:12px;font-weight:700;color:#374151;margin-bottom:5px;}
  .modal-input{width:100%;padding:11px 13px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;outline:none;margin-bottom:12px;background:#fff;color:#1e293b;}
  .modal-select{width:100%;padding:11px 13px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;outline:none;margin-bottom:12px;background:#fff;color:#1e293b;}
  .modal-textarea{width:100%;padding:11px 13px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;outline:none;margin-bottom:12px;background:#fff;color:#1e293b;resize:none;height:80px;}
  .modal-save-btn{width:100%;padding:14px 0;background:linear-gradient(135deg,#0a1628,#0d3b7a);color:#fff;border:none;border-radius:14px;font-weight:800;font-size:16px;margin-bottom:10px;}
  .modal-cancel-btn{flex:1;padding:12px 0;background:#f1f5f9;color:#64748b;border:none;border-radius:12px;font-weight:700;font-size:14px;}
  .modal-del-btn{flex:1;padding:12px 0;background:#fef2f2;color:#dc2626;border:none;border-radius:12px;font-weight:700;font-size:14px;}
  .toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);color:#fff;padding:9px 22px;border-radius:30px;font-weight:700;font-size:13px;z-index:500;box-shadow:0 4px 20px rgba(0,0,0,.25);white-space:nowrap;pointer-events:none;}
  .cal-wrap{position:relative;margin-bottom:12px;}
  .cal-trigger{width:100%;padding:11px 13px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;background:#fff;text-align:left;display:flex;align-items:center;justify-content:space-between;}
  .cal-popup{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.18);border:1.5px solid #e2e8f0;z-index:100;padding:14px 12px;}
  .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .cal-nav-btn{background:#f1f5f9;border:none;border-radius:8px;width:30px;height:30px;font-size:16px;color:#0d3b7a;font-weight:900;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
  .cal-wd{text-align:center;font-size:11px;font-weight:700;padding:4px 0;}
  .cal-day{padding:6px 0;border-radius:8px;border:none;font-size:13px;background:transparent;width:100%;}
  .login-wrap{min-height:100vh;background:linear-gradient(160deg,#0a1628 0%,#0d3b7a 60%,#1a5276 100%);display:flex;align-items:center;justify-content:center;padding:20px;}
  .login-box{background:rgba(255,255,255,.97);border-radius:28px;padding:36px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.5);}
  .login-btn{width:100%;padding:14px 0;border:none;border-radius:14px;font-weight:800;font-size:16px;letter-spacing:.5px;}
  .flex{display:flex;}
  .flex-1{flex:1;}
  .items-center{align-items:center;}
  .gap-8{gap:8px;}
  .gap-10{gap:10px;}
  .ml-8{margin-left:8px;}
  .p-14{padding:0 14px;}
  .mt-4{margin-top:4px;}
  .w-full{width:100%;}
  .info-box{background:#1e293b;border-radius:14px;padding:14px 16px;color:#e2e8f0;}
  .manual-wrap{padding-bottom:20px;}
  .manual-hero{background:linear-gradient(135deg,#0a1628 0%,#0d3b7a 100%);border-radius:16px;padding:16px;margin-bottom:14px;color:#fff;}
  .manual-hero-title{font-size:16px;font-weight:900;margin-bottom:4px;}
  .manual-hero-sub{font-size:10px;opacity:.7;line-height:1.6;}
  .manual-section{margin-bottom:14px;}
  .manual-section-title{font-size:13px;font-weight:900;color:#0a1628;padding:10px 14px;background:#e8f0fb;border-radius:12px 12px 0 0;border-left:4px solid #0d3b7a;display:flex;align-items:center;gap:6px;}
  .manual-section-body{background:#fff;border-radius:0 0 12px 12px;box-shadow:0 1px 6px rgba(0,0,0,.06);overflow:hidden;}
  .flow-step{display:flex;align-items:stretch;border-bottom:1px solid #f1f5f9;}
  .flow-step:last-child{border-bottom:none;}
  .flow-num{background:#0d3b7a;color:#fff;font-size:13px;font-weight:900;width:36px;min-width:36px;display:flex;align-items:center;justify-content:center;}
  .flow-content{padding:10px 12px;flex:1;}
  .flow-title{font-size:12px;font-weight:800;color:#0a1628;margin-bottom:2px;}
  .flow-desc{font-size:11px;color:#64748b;line-height:1.6;}
  .urgency-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px;}
  .urgency-box{border-radius:10px;padding:10px;}
  .urgency-box.red{background:#fef2f2;border:1.5px solid #fca5a5;}
  .urgency-box.green{background:#f0fdf4;border:1.5px solid #86efac;}
  .urgency-label{font-size:12px;font-weight:900;margin-bottom:6px;}
  .urgency-label.red{color:#dc2626;}
  .urgency-label.green{color:#16a34a;}
  .urgency-item{font-size:10px;color:#374151;line-height:1.7;display:flex;align-items:flex-start;gap:4px;}
  .script-box{margin:0;}
  .script-header{padding:8px 12px;font-size:11px;font-weight:800;color:#fff;}
  .script-header.blue{background:#0d3b7a;}
  .script-header.green{background:#16a34a;}
  .script-header.red{background:#dc2626;}
  .script-body{padding:12px;font-size:12px;color:#0a1628;line-height:1.8;background:#f8fbff;border-bottom:1px solid #e2e8f0;}
  .script-body.green{background:#f0fdf4;}
  .script-body.red{background:#fef2f2;}
  .script-note{font-size:10px;color:#dc2626;padding:8px 12px;background:#fef2f2;font-weight:700;}
  .checklist-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid #f1f5f9;}
  .checklist-item:last-child{border-bottom:none;}
  .check-box{width:22px;height:22px;border:2px solid #0d3b7a;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;color:#0d3b7a;font-weight:900;}
  .check-label{font-size:12px;color:#1e293b;flex:1;line-height:1.5;}
  .check-tag{font-size:9px;padding:2px 7px;border-radius:10px;font-weight:700;flex-shrink:0;}
  .check-tag.required{background:#fee2e2;color:#dc2626;}
  .check-tag.important{background:#fef3c7;color:#d97706;}
  .check-tag.normal{background:#dbeafe;color:#1d4ed8;}
  .point-item{padding:12px 14px;border-bottom:1px solid #f1f5f9;display:flex;gap:10px;}
  .point-item:last-child{border-bottom:none;}
  .point-bar{width:4px;border-radius:2px;flex-shrink:0;min-height:100%;}
  .point-content{}
  .point-title{font-size:12px;font-weight:800;margin-bottom:3px;}
  .point-desc{font-size:11px;color:#64748b;line-height:1.6;}
  .contact-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid #f1f5f9;}
  .contact-row:last-child{border-bottom:none;}
  .contact-label{font-size:12px;font-weight:700;color:#0a1628;min-width:80px;}
  .contact-value{font-size:13px;font-weight:900;color:#0d3b7a;flex:1;}
  .contact-call-btn{background:#0d3b7a;color:#fff;border:none;border-radius:8px;padding:5px 10px;font-size:11px;font-weight:700;}

  /* ===== 報告書タブ ===== */
  .report-wrap{padding-bottom:20px;}
  .report-ctrl{background:#fff;border-radius:16px;padding:14px 16px;margin-bottom:14px;box-shadow:0 1px 6px rgba(0,0,0,.06);}
  .report-ctrl-title{font-size:13px;font-weight:800;color:#0a1628;margin-bottom:10px;}
  .report-month-nav{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .report-month-nav span{font-size:16px;font-weight:900;flex:1;text-align:center;color:#0a1628;}
  .report-nav-btn{background:#f1f5f9;border:none;color:#0d3b7a;width:36px;height:36px;border-radius:10px;font-size:20px;font-weight:900;}
  .btn-print{width:100%;padding:12px 0;background:linear-gradient(135deg,#0a1628,#0d3b7a);color:#fff;border:none;border-radius:12px;font-weight:800;font-size:14px;}
  .report-body{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.06);margin-bottom:14px;}
  .report-title-bar{background:linear-gradient(135deg,#0a1628,#0d3b7a);color:#fff;padding:16px 18px;}
  .report-title-bar h2{font-size:15px;font-weight:900;margin-bottom:2px;}
  .report-title-bar .sub{font-size:10px;opacity:.75;}
  .report-title-bar .period{display:inline-block;background:rgba(255,255,255,.2);border-radius:20px;padding:3px 12px;font-size:12px;font-weight:700;margin-top:8px;}

  .summary-card{padding:12px 8px;text-align:center;border-right:1px solid #e2e8f0;}
  .summary-card:last-child{border-right:none;}
  .s-num{font-size:24px;font-weight:900;line-height:1;margin-bottom:3px;}
  .s-label{font-size:10px;color:#64748b;font-weight:600;}
  .sec-title{background:#f1f5f9;border-left:4px solid #0d3b7a;padding:7px 14px;font-size:12px;font-weight:800;color:#1e3a5f;}

  .report-table th:last-child{border-right:none;}

  .report-table tr:nth-child(even) td{background:#f8fafc;}

  .badge-unset{display:inline-block;background:#f1f5f9;color:#94a3b8;border-radius:4px;padding:1px 5px;font-size:10px;}

  .monthly-summary{padding:12px 16px;}

  .ms-val{font-weight:700;color:#1e3a5f;}

    @page{margin:8mm;size:A4;}
  }

<body>
<div id="app"></div>
<script>
const MONTHS_JP=["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
const WEEK_JP=["日","月","火","水","木","金","土"];
const CONTENT_MASTER=["サービス変更・調整の相談","体調変化・急変の連絡","入院・受診の連絡","退院・帰宅の連絡","サービス事業所からの連絡","家族からの状況確認","緊急時対応の相談","ターミナル期に関する相談","夜間・休日の薬・医療に関する相談","転倒・事故の連絡","認知症症状への対応相談","サービス拒否・トラブルの連絡","その他（詳細は備考に記入）"];
const RESPONSE_MASTER=["電話で状況確認・助言","主治医・医療機関に連絡・連携","サービス事業所に連絡・調整","家族へ連絡・説明","緊急訪問の手配","救急要請の助言・手配","翌営業日に対応予定として記録","モニタリング記録に追記予定","居宅サービス計画の変更検討を開始","地域包括支援センターへ連絡","その他（詳細は備考に記入）"];

const Store={
  get(key,def){try{const v=localStorage.getItem(key);return v?JSON.parse(v):def;}catch{return def;}},
  set(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch{}}
};

const state={
  userName:Store.get("userName",""),
  tab:"calendar",
  year:new Date().getFullYear(),
  month:new Date().getMonth(),
  data:Store.get("24h-data",{}),
  terminal:Store.get("24h-terminal",{}),
  staff:Store.get("24h-staff",["山田 花子","佐藤 太郎","鈴木 恵子","田中 美穂","中村 健一"]),
  modal:null,
  openDays:{},
  toast:null,
  toastTimer:null,
  calOpen:false,
  reportYear:new Date().getFullYear(),
  reportMonth:new Date().getMonth(),
};

function saveData(){Store.set("24h-data",state.data);}

function showToast(msg,type="ok"){
  if(state.toastTimer)clearTimeout(state.toastTimer);
  state.toast={msg,type};render();
  state.toastTimer=setTimeout(()=>{state.toast=null;render();},2200);
}
function dateKey(y,m,d){return`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;}
function getDayData(dk){return state.data[dk]||{hasCall:null,dutyStaff:"",records:[],note:""};}
function fmtNow(){return new Date().toLocaleString("ja-JP",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"});}
function getDays(y,m){
  const last=new Date(y,m+1,0).getDate();
  return Array.from({length:last},(_,i)=>{const d=i+1;const date=new Date(y,m,d);return{day:d,wd:WEEK_JP[date.getDay()],dow:date.getDay()};});
}
function formatDate(str){if(!str)return'';const d=new Date(str);return d.toLocaleDateString("ja-JP",{year:"numeric",month:"long",day:"numeric"});}
function toWareki(y){if(y>=2019)return`令和${y-2018}年`;if(y>=1989)return`平成${y-1988}年`;return`${y}年`;}

function render(){
  const app=document.getElementById("app");

  app.innerHTML=renderMain();bindMain();
}

function renderReport(){
  const ry=state.reportYear;
  const rm=state.reportMonth;
  const days=getDays(ry,rm);
  const waYear=ry-2018;
  let callCount=0,noneCount=0,unsetCount=0,totalCallRecs=0;
  const dayList=days.map(({day,wd,dow})=>{
    const dk=dateKey(ry,rm,day);
    const dd=getDayData(dk);
    const hasCall=dd.hasCall;
    const duty=dd.dutyStaff||'―';
    const recs=dd.records||[];
    if(hasCall===true){callCount++;totalCallRecs+=recs.length;}
    else if(hasCall===false)noneCount++;
    else unsetCount++;
    return{day,wd,dow,dk,hasCall,duty,recs};
  });
  const recordedDays=callCount+noneCount;

  let tableRows='';
  for(const{day,wd,dow,hasCall,duty,recs}of dayList){
    const isSun=dow===0,isSat=dow===6;
    const dowColor=isSun?'#dc2626':isSat?'#2563eb':'#1e293b';
    let badge='';
    let detail='';
    if(hasCall===true){
      badge='<span class="badge-call">📞 あり</span>';
      if(recs.length>0){
        recs.forEach(c=>{
          detail+=`<div class="call-detail-box">`;
          if(c.time)detail+=`⏰${c.time} `;
          if(c.staff)detail+=`担当:${c.staff}<br>`;
          if(c.content)detail+=`内容:${c.content==='その他（詳細は備考に記入）'?c.contentFree:c.content}<br>`;
          if(c.response)detail+=`対応:${c.response==='その他（詳細は備考に記入）'?c.responseFree:c.response}`;
          if(c.memo)detail+=`<br>備考:${c.memo}`;
          detail+=`</div>`;
        });
      }else{
        detail='<span style="color:#94a3b8;font-size:10px;">詳細未入力</span>';
      }
    }else if(hasCall===false){
      badge='<span class="badge-none">📵 なし</span>';
    }else{
      badge='<span class="badge-unset">未記録</span>';
    }
    tableRows+=`<tr>
      <td style="text-align:center;font-weight:700;white-space:nowrap;color:${dowColor}">${rm+1}/${day}(${wd})</td>
      <td style="text-align:center;font-size:10px;color:#475569;">${duty}</td>
      <td style="text-align:center;">${badge}</td>
      <td>${detail}</td>
    </tr>`;
  }

  // 電話あった日の詳細まとめ
  const callDays=dayList.filter(r=>r.hasCall===true&&r.recs.length>0);
  let callDetailHtml='';
  if(callDays.length===0){
    callDetailHtml=`<div style="padding:14px;text-align:center;color:#94a3b8;font-size:12px;">電話対応なし、または詳細未入力です</div>`;
  }else{
    callDays.forEach(({day,wd,duty,recs})=>{
      callDetailHtml+=`<div style="padding:10px 14px;border-bottom:1px solid #f1f5f9;">
        <div style="font-weight:800;font-size:12px;color:#1e3a5f;margin-bottom:6px;">📞 ${rm+1}月${day}日(${wd}) 当番：${duty}</div>`;
      recs.forEach((c,i)=>{
        if(recs.length>1)callDetailHtml+=`<div style="font-size:10px;color:#6366f1;font-weight:700;margin-bottom:2px;">▶ 対応${i+1}件目</div>`;
        callDetailHtml+=`<div style="padding-left:8px;font-size:11px;line-height:1.8;">`;
        if(c.time)callDetailHtml+=`<div><span style="color:#64748b;font-weight:600;">対応時刻：</span>${c.time}</div>`;
        if(c.staff)callDetailHtml+=`<div><span style="color:#64748b;font-weight:600;">対応担当：</span>${c.staff}</div>`;
        if(c.content)callDetailHtml+=`<div><span style="color:#64748b;font-weight:600;">相談内容：</span>${c.content==='その他（詳細は備考に記入）'?c.contentFree:c.content}</div>`;
        if(c.response)callDetailHtml+=`<div><span style="color:#64748b;font-weight:600;">対応内容：</span>${c.response==='その他（詳細は備考に記入）'?c.responseFree:c.response}</div>`;
        if(c.memo)callDetailHtml+=`<div><span style="color:#64748b;font-weight:600;">備考：</span>${c.memo}</div>`;
        callDetailHtml+=`</div>`;
      });
      callDetailHtml+=`</div>`;
    });
  }

  return`
  <div class="report-wrap">
    <!-- 月選択コントロール（印刷時非表示） -->
    <div class="report-ctrl">
      <div class="report-ctrl-title">📋 月次報告書を表示・印刷</div>
      <div class="report-month-nav">
        <button class="report-nav-btn" id="rep-prev">‹</button>
        <span>${toWareki(ry)}（${ry}年）${rm+1}月</span>
        <button class="report-nav-btn" id="rep-next">›</button>
      </div>
      <button class="btn-print" id="print-btn">🖨️ 印刷・PDF保存（行政提出用）</button>
    </div>

    <!-- 報告書本体（印刷対象） -->
    <div class="report-body">
      <!-- タイトル -->
      <div class="report-title-bar">
        <h2>📋 24時間連絡体制 月次報告書</h2>
        <div class="sub">ケアプランセンター桃園　｜　特定事業所加算Ⅰ 体制確認書類</div>
        <div class="period">令和${waYear}年（${ry}年）${rm+1}月分</div>
      </div>

      <!-- サマリー -->
      <div class="summary-row">
        <div class="summary-card">
          <div class="s-num" style="color:#1e40af;">${days.length}</div>
          <div class="s-label">対象日数</div>
        </div>
        <div class="summary-card">
          <div class="s-num" style="color:#dc2626;">${callCount}</div>
          <div class="s-label">📞 電話あり</div>
        </div>
        <div class="summary-card">
          <div class="s-num" style="color:#16a34a;">${noneCount}</div>
          <div class="s-label">📵 電話なし</div>
        </div>
      </div>

      <!-- 日別記録 -->
      <div class="sec-title">■ 日別記録一覧</div>
      <table class="report-table">
        <tr>
          <th style="width:70px;">日付</th>
          <th style="width:70px;">当番担当</th>
          <th style="width:55px;">電話</th>
          <th>対応内容</th>
        </tr>
        ${tableRows}
      </table>

      <!-- 電話対応詳細 -->
      <div class="sec-title">■ 電話対応記録（詳細）</div>
      ${callDetailHtml}

      <!-- 月まとめ -->
      <div class="sec-title">■ 月間まとめ</div>
      <div class="monthly-summary">
        <div class="ms-row"><span class="ms-key">対象期間</span><span class="ms-val">令和${waYear}年${rm+1}月1日 〜 ${rm+1}月${days.length}日</span></div>
        <div class="ms-row"><span class="ms-key">総日数</span><span class="ms-val">${days.length}日</span></div>
        <div class="ms-row"><span class="ms-key">記録済日数</span><span class="ms-val">${recordedDays}日${unsetCount>0?`（未記録${unsetCount}日）`:'（全日記録済）'}</span></div>
        <div class="ms-row"><span class="ms-key">📞 電話あり</span><span class="ms-val" style="color:#dc2626;">${callCount}日（${totalCallRecs}件の対応）</span></div>
        <div class="ms-row"><span class="ms-key">📵 電話なし</span><span class="ms-val" style="color:#16a34a;">${noneCount}日</span></div>
        <div class="ms-row"><span class="ms-key">24時間体制</span><span class="ms-val">✅ 確保（輪番制による対応）</span></div>
      </div>

      <div class="report-footer-bar">ケアプランセンター桃園　｜　特定事業所加算Ⅰ 体制確認書類　｜　令和${waYear}年${rm+1}月分</div>
    </div>
  </div>`;
}

function renderCalendar(days,today){
  return days.map(({day,wd,dow})=>{
    const dk=dateKey(state.year,state.month,day);
    const dd=getDayData(dk);
    const isToday=today.getFullYear()===state.year&&today.getMonth()===state.month&&today.getDate()===day;
    const isOpen=state.openDays[dk];
    const recs=dd.records||[];
    const isSun=dow===0,isSat=dow===6;
    let cardClass="day-card";
    if(isToday)cardClass+=" today";
    else if(dd.hasCall===false)cardClass+=" no-call";
    else if(dd.hasCall===true)cardClass+=" has-call";
    else cardClass+=" unrecorded";
    return`
    <div class="${cardClass}">
      <div class="day-bar" data-dk="${dk}" data-action="toggle-day">
        <div style="min-width:54px;display:flex;align-items:baseline;gap:2px;">
          <span class="day-num ${isSun?'sun':isSat?'sat':isToday?'today-num':'normal'}">${day}</span>
          <span class="day-wd" style="color:${isSun?'#dc2626':isSat?'#2563eb':'#94a3b8'}">(${wd})</span>
          ${isToday?'<span class="today-badge">今日</span>':""}
        </div>
        <button class="call-btn ${dd.hasCall===false?'none-active':'none-inactive'}" data-dk="${dk}" data-call="false" onclick="event.stopPropagation()">📵 なし</button>
        <button class="call-btn ${dd.hasCall===true?'yes-active':'yes-inactive'}" data-dk="${dk}" data-call="true" onclick="event.stopPropagation()">📞 あり</button>
        <div style="flex:1;text-align:right;">
          <select class="duty-select" data-dk="${dk}" data-action="duty" onclick="event.stopPropagation()">
            <option value="">当番未設定</option>
            ${state.staff.map(s=>`<option value="${s}" ${dd.dutyStaff===s?'selected':''}>${s}</option>`).join("")}
          </select>
        </div>
        ${recs.length>0?`<div class="call-badge">${recs.length}件</div>`:""}
        <span class="expand-arrow">${isOpen?'▲':'▼'}</span>
      </div>
      ${isOpen?`
      <div class="day-expand">
        ${recs.length===0
          ?`<div class="empty-msg">${dd.hasCall===true?'電話あり → 記録を追加してください':'記録なし'}</div>`
          :recs.map(rec=>`
          <div class="rec-card">
            <div class="flex items-center gap-8" style="flex-wrap:wrap;margin-bottom:5px;">
              <span class="rec-time">🕐 ${rec.time||'時刻未入力'}</span>
              <span class="rec-staff">${rec.staff}</span>
            </div>
            <div style="font-size:12px;color:#374151;margin-bottom:3px;"><span class="rec-label rec-content-label">内容：</span>${rec.content==='その他（詳細は備考に記入）'?rec.contentFree:rec.content}</div>
            <div style="font-size:12px;color:#374151;${rec.memo?'margin-bottom:3px':''}"><span class="rec-label rec-response-label">対応：</span>${rec.response==='その他（詳細は備考に記入）'?rec.responseFree:rec.response}</div>
            ${rec.memo?`<div class="rec-memo">📝 ${rec.memo}</div>`:''}
            <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-top:5px;">
              <div class="rec-meta">記録：${rec.createdBy} ${rec.createdAt}${rec.updatedBy?` / 更新：${rec.updatedBy} ${rec.updatedAt}`:''}</div>
              <div class="rec-actions">
                <button class="btn-edit" data-dk="${dk}" data-rid="${rec.id}" data-action="edit-rec">編集</button>
                <button class="btn-del" data-dk="${dk}" data-rid="${rec.id}" data-action="del-rec">削除</button>
              </div>
            </div>
          </div>`).join("")}
        <button class="add-rec-btn" data-dk="${dk}" data-action="add-rec">＋ 対応記録を追加</button>
        <textarea class="note-textarea" placeholder="当日の特記事項・申し送り（任意）" data-dk="${dk}" data-action="note">${dd.note||''}</textarea>
      </div>
      `:""}
    </div>`;
  }).join("");
}

      <div class="flex gap-10" style="margin-bottom:14px;">
        <button id="t-unsigned" style="flex:1;padding:10px 0;border:2px solid ${!f.signed?'#fbbf24':'#e2e8f0'};border-radius:12px;background:${!f.signed?'#fffbeb':'#fff'};color:${!f.signed?'#d97706':'#94a3b8'};font-weight:700;font-size:13px;">⏳ 未取得</button>
        <button id="t-signed" style="flex:1;padding:10px 0;border:2px solid ${f.signed?'#6ee7b7':'#e2e8f0'};border-radius:12px;background:${f.signed?'#d1fae5':'#fff'};color:${f.signed?'#059669':'#94a3b8'};font-weight:700;font-size:13px;">✅ 取得済み</button>
      </div>
      ${f.signed?`
      <div class="modal-label">署名取得日</div>
      <div class="cal-wrap" id="cal-wrap">
        <button class="cal-trigger" id="cal-trigger" type="button">
          <span>📅 ${signedDateStr}</span>
          <span style="font-size:11px;color:#94a3b8;">▼</span>
        </button>
        ${m.calOpen?renderCalPopup(f.signDate):''}
      </div>
      <div class="modal-label">ターミナル確認署名医師</div>
      <select class="modal-select" id="t-sign-doctor" onchange="document.getElementById('t-sign-doctor-free-wrap').style.display=this.value==='その他'?'block':'none'">
        <option value="">-- 選択してください --</option>
        <option value="福永医師" ${f.signDoctor==='福永医師'?'selected':''}>福永医師</option>
        <option value="植村医師" ${f.signDoctor==='植村医師'?'selected':''}>植村医師</option>
        <option value="秋月医師" ${f.signDoctor==='秋月医師'?'selected':''}>秋月医師</option>
        <option value="その他" ${f.signDoctor==='その他'?'selected':''}>その他（直接入力）</option>
      </select>
      <div id="t-sign-doctor-free-wrap" style="display:${f.signDoctor==='その他'?'block':'none'}">
        <input class="modal-input" id="t-sign-doctor-free" placeholder="医師名を入力" value="${f.signDoctorFree||''}">
      </div>
      `:''}
      <div class="modal-label">備考・メモ（任意）</div>
      <textarea class="modal-textarea" id="t-note" placeholder="家族への説明日・書類保存場所など">${f.note||''}</textarea>
      <button class="modal-save-btn" id="t-save">💾 保存する</button>
      <div class="flex gap-10">
        ${!m.isNew?`<button class="modal-del-btn" id="t-del">🗑 削除</button>`:''}
        <button class="modal-cancel-btn" id="t-cancel">キャンセル</button>
      </div>
    </div>
  </div>`;
}

function renderCalPopup(selected){
  const m=state.modal;
  const cy=m.calYear||(selected?parseInt(selected.split('-')[0]):new Date().getFullYear());
  const cm=m.calMonth!==undefined?m.calMonth:(selected?parseInt(selected.split('-')[1])-1:new Date().getMonth());
  const today=new Date();
  const first=new Date(cy,cm,1).getDay();
  const last=new Date(cy,cm+1,0).getDate();
  const cells=[];
  for(let i=0;i<first;i++)cells.push(null);
  for(let d=1;d<=last;d++)cells.push(d);
  const selY=selected?parseInt(selected.split('-')[0]):null;
  const selM=selected?parseInt(selected.split('-')[1])-1:null;
  const selD=selected?parseInt(selected.split('-')[2]):null;
  return`
  <div class="cal-popup" id="cal-popup">
    <div class="cal-nav">
      <button class="cal-nav-btn" id="cal-prev">‹</button>
      <span style="font-weight:800;font-size:15px;color:#0a1628;">${cy}年 ${MONTHS_JP[cm]}</span>
      <button class="cal-nav-btn" id="cal-next">›</button>
    </div>
    <div class="cal-grid" style="margin-bottom:4px;">
      ${WEEK_JP.map((w,i)=>`<div class="cal-wd" style="color:${i===0?'#dc2626':i===6?'#2563eb':'#64748b'}">${w}</div>`).join("")}
    </div>
    <div class="cal-grid">
      ${cells.map((d,i)=>{
        if(!d)return`<div></div>`;
        const col=i%7;
        const isSun=col===0,isSat=col===6;
        const isTd=today.getFullYear()===cy&&today.getMonth()===cm&&today.getDate()===d;
        const isSel=selY===cy&&selM===cm&&selD===d;
        return`<button class="cal-day" data-action="cal-day" data-d="${d}" data-y="${cy}" data-m="${cm}" style="font-weight:${isSel||isTd?800:400};background:${isSel?'#0d3b7a':isTd?'#eff6ff':'transparent'};color:${isSel?'#fff':isSun?'#dc2626':isSat?'#2563eb':isTd?'#0d3b7a':'#1e293b'};outline:${isTd&&!isSel?'2px solid #93c5fd':'none'}">${d}</button>`;
      }).join("")}
    </div>
    ${selected?`<button id="cal-clear" style="width:100%;margin-top:10px;padding:7px 0;background:#fef2f2;color:#dc2626;border:none;border-radius:8px;font-size:12px;font-weight:700;">クリア</button>`:''}
  </div>`;
}

function bindMain(){
  const app=document.getElementById("app");
  app.querySelectorAll('[data-tab]').forEach(btn=>{btn.addEventListener('click',()=>{state.tab=btn.dataset.tab;render();});});
  const prev=document.getElementById('prev-month');
  const next=document.getElementById('next-month');
  if(prev)prev.addEventListener('click',()=>{if(state.month===0){state.year--;state.month=11;}else state.month--;render();});
  if(next)next.addEventListener('click',()=>{if(state.month===11){state.year++;state.month=0;}else state.month++;render();});
  // 報告書の月ナビ
  // 印刷ボタン
  const printBtn=document.getElementById('print-btn');
  if(printBtn)printBtn.addEventListener('click',()=>{ window.print(); });
  const repPrev=document.getElementById('rep-prev');
  const repNext=document.getElementById('rep-next');
  if(repPrev)repPrev.addEventListener('click',()=>{if(state.reportMonth===0){state.reportYear--;state.reportMonth=11;}else state.reportMonth--;render();});
  if(repNext)repNext.addEventListener('click',()=>{if(state.reportMonth===11){state.reportYear++;state.reportMonth=0;}else state.reportMonth++;render();});
  if(state.tab==='calendar')bindCalendar(app);
  if(state.tab==='terminal')bindTerminal(app);
  if(state.tab==='staff')bindStaff(app);
  if(state.modal)bindModal(app);
}

function bindCalendar(app){
  app.querySelectorAll('[data-action="toggle-day"]').forEach(el=>{el.addEventListener('click',()=>{const dk=el.dataset.dk;state.openDays[dk]=!state.openDays[dk];render();});});
  app.querySelectorAll('[data-call]').forEach(btn=>{btn.addEventListener('click',e=>{e.stopPropagation();const dk=btn.dataset.dk;const val=btn.dataset.call==='true';const dd=getDayData(dk);state.data[dk]={...dd,hasCall:val};if(val)state.openDays[dk]=true;saveData();render();});});
  app.querySelectorAll('[data-action="duty"]').forEach(sel=>{sel.addEventListener('change',e=>{e.stopPropagation();const dk=sel.dataset.dk;const dd=getDayData(dk);state.data[dk]={...dd,dutyStaff:sel.value};saveData();});});
  app.querySelectorAll('[data-action="add-rec"]').forEach(btn=>{btn.addEventListener('click',()=>{state.modal={type:'record',dk:btn.dataset.dk,isNew:true,record:{time:'',staff:state.staff[0]||'',content:'',contentFree:'',response:'',responseFree:'',memo:''}};render();});});
  app.querySelectorAll('[data-action="edit-rec"]').forEach(btn=>{btn.addEventListener('click',()=>{const dk=btn.dataset.dk;const rid=parseInt(btn.dataset.rid);const rec=(getDayData(dk).records||[]).find(r=>r.id===rid);if(rec){state.modal={type:'record',dk,isNew:false,record:{...rec}};render();}});});
  app.querySelectorAll('[data-action="del-rec"]').forEach(btn=>{btn.addEventListener('click',()=>{if(!confirm('削除しますか？'))return;const dk=btn.dataset.dk;const rid=parseInt(btn.dataset.rid);const dd=getDayData(dk);state.data[dk]={...dd,records:(dd.records||[]).filter(r=>r.id!==rid)};saveData();showToast('記録を削除しました');render();});});
  app.querySelectorAll('[data-action="note"]').forEach(ta=>{ta.addEventListener('blur',()=>{const dk=ta.dataset.dk;const dd=getDayData(dk);state.data[dk]={...dd,note:ta.value};saveData();});});
}

function bindTerminal(app){
  app.querySelectorAll('[data-action="edit-terminal"]').forEach(btn=>{btn.addEventListener('click',()=>{const name=btn.dataset.name;const info=state.terminal[name]||{};state.modal={type:'terminal',isNew:false,origName:name,form:{name,facility:info.facility||'',careManager:info.careManager||'',doctor:info.doctor||'',doctorFree:info.doctorFree||'',kpName:info.kpName||'',kpRel:info.kpRel||'',kpRelFree:info.kpRelFree||'',kpAddr:info.kpAddr||'',kpTel:info.kpTel||'',signDoctor:info.signDoctor||'',signDoctorFree:info.signDoctorFree||'',signed:info.signed||false,signDate:info.signDate||'',note:info.note||''},calOpen:false};render();});});
  const addBtn=app.querySelector('[data-action="add-terminal"]');
  if(addBtn)addBtn.addEventListener('click',()=>{state.modal={type:'terminal',isNew:true,form:{name:'',facility:'',careManager:'',doctor:'',doctorFree:'',kpName:'',kpRel:'',kpRelFree:'',kpAddr:'',kpTel:'',signDoctor:'',signDoctorFree:'',signed:false,signDate:'',note:''},calOpen:false};render();});
}

function bindStaff(app){
  app.querySelectorAll('[data-action="staff-input"]').forEach(inp=>{inp.addEventListener('input',()=>{state.staff[parseInt(inp.dataset.idx)]=inp.value;});});
  app.querySelectorAll('[data-action="staff-del"]').forEach(btn=>{btn.addEventListener('click',()=>{state.staff.splice(parseInt(btn.dataset.idx),1);saveStaff();render();});});
  const addBtn=app.querySelector('[data-action="staff-add"]');
  if(addBtn)addBtn.addEventListener('click',()=>{state.staff.push('');render();});
  const saveBtn=app.querySelector('[data-action="staff-save"]');
  if(saveBtn)saveBtn.addEventListener('click',()=>{saveStaff();showToast('保存しました');render();});
}

function bindModal(app){
  const overlay=document.getElementById('modal-overlay');
  if(overlay)overlay.addEventListener('click',e=>{if(e.target===overlay){state.modal=null;render();}});
  const m=state.modal;
  if(m.type==='record'){
    const contentSel=document.getElementById('rec-content');
    const responseSel=document.getElementById('rec-response');
    if(contentSel)contentSel.addEventListener('change',()=>{m.record.content=contentSel.value;});
    if(responseSel)responseSel.addEventListener('change',()=>{m.record.response=responseSel.value;});
    const saveBtn=document.getElementById('rec-save');
    if(saveBtn)saveBtn.addEventListener('click',()=>{
      const th=document.getElementById('rec-time-h')?.value||'';const tm=document.getElementById('rec-time-m')?.value||'';const time=th&&tm?th+':'+tm:'';
      const staff=document.getElementById('rec-staff')?.value||'';
      const content=document.getElementById('rec-content')?.value||'';
      const response=document.getElementById('rec-response')?.value||'';
      if(!time||!staff||!content||!response){showToast('時刻・担当者・内容・対応は必須です','err');return;}
      const contentFree=document.getElementById('rec-content-free')?.value||'';
      const responseFree=document.getElementById('rec-response-free')?.value||'';
      const memo=document.getElementById('rec-memo')?.value||'';
      const dk=m.dk;const dd=getDayData(dk);let recs=[...(dd.records||[])];
      if(m.isNew){recs.push({id:Date.now(),time,staff,content,contentFree,response,responseFree,memo,createdBy:state.userName,createdAt:fmtNow()});}
      else{recs=recs.map(r=>r.id===m.record.id?{...r,time,staff,content,contentFree,response,responseFree,memo,updatedBy:state.userName,updatedAt:fmtNow()}:r);}
      const keepDuty=state.data[dk]?.dutyStaff||dd.dutyStaff||'';state.data[dk]={...dd,dutyStaff:keepDuty,records:recs,hasCall:true};saveData();state.modal=null;showToast(m.isNew?'記録を追加しました':'記録を更新しました');render();
    });
    const cancelBtn=document.getElementById('rec-cancel');
    if(cancelBtn)cancelBtn.addEventListener('click',()=>{state.modal=null;render();});
  }
  if(m.type==='terminal'){
    const unsignedBtn=document.getElementById('t-unsigned');
    const signedBtn=document.getElementById('t-signed');
    if(unsignedBtn)unsignedBtn.addEventListener('click',()=>{m.form.signed=false;render();});
    if(signedBtn)signedBtn.addEventListener('click',()=>{m.form.signed=true;render();});
    const calTrigger=document.getElementById('cal-trigger');
    if(calTrigger)calTrigger.addEventListener('click',e=>{e.stopPropagation();m.calOpen=!m.calOpen;if(m.calOpen&&m.form.signDate){m.calYear=parseInt(m.form.signDate.split('-')[0]);m.calMonth=parseInt(m.form.signDate.split('-')[1])-1;}render();});
    const calPrev=document.getElementById('cal-prev');
    const calNext=document.getElementById('cal-next');
    if(calPrev)calPrev.addEventListener('click',e=>{e.stopPropagation();if(!m.calYear)m.calYear=new Date().getFullYear();if(m.calMonth===undefined)m.calMonth=new Date().getMonth();if(m.calMonth===0){m.calYear--;m.calMonth=11;}else m.calMonth--;render();});
    if(calNext)calNext.addEventListener('click',e=>{e.stopPropagation();if(!m.calYear)m.calYear=new Date().getFullYear();if(m.calMonth===undefined)m.calMonth=new Date().getMonth();if(m.calMonth===11){m.calYear++;m.calMonth=0;}else m.calMonth++;render();});
    app.querySelectorAll('[data-action="cal-day"]').forEach(btn=>{btn.addEventListener('click',e=>{e.stopPropagation();const y=btn.dataset.y,mo=String(parseInt(btn.dataset.m)+1).padStart(2,'0'),d=String(btn.dataset.d).padStart(2,'0');m.form.signDate=`${y}-${mo}-${d}`;m.calOpen=false;render();});});
    const calClear=document.getElementById('cal-clear');
    if(calClear)calClear.addEventListener('click',e=>{e.stopPropagation();m.form.signDate='';m.calOpen=false;render();});
    const saveBtn=document.getElementById('t-save');
    if(saveBtn)saveBtn.addEventListener('click',()=>{
      const name=document.getElementById('t-name')?.value.trim()||'';
      if(!name){showToast('利用者名を入力してください','err');return;}
      const facility=document.getElementById('t-facility')?.value||'';
      const cm=document.getElementById('t-cm')?.value||'';
      const doctor=document.getElementById('t-doctor')?.value||'';
      const doctorFree=document.getElementById('t-doctor-free')?.value||'';
      const kpName=document.getElementById('t-kp-name')?.value||'';
      const kpRel=document.getElementById('t-kp-rel')?.value||'';
      const kpRelFree=document.getElementById('t-kp-rel-free')?.value||'';
      const kpAddr=document.getElementById('t-kp-addr')?.value||'';
      const kpTel=document.getElementById('t-kp-tel')?.value||'';
      const signDoctor=document.getElementById('t-sign-doctor')?.value||'';
      const signDoctorFree=document.getElementById('t-sign-doctor-free')?.value||'';
      const note=document.getElementById('t-note')?.value||'';
      if(!m.isNew&&m.origName&&m.origName!==name)delete state.terminal[m.origName];
      state.terminal[name]={facility,careManager:cm,doctor,doctorFree,kpName,kpRel,kpRelFree,kpAddr,kpTel,signDoctor,signDoctorFree,signed:m.form.signed,signDate:m.form.signDate,note};
      saveTerminal();state.modal=null;showToast('保存しました');render();
    });
    const delBtn=document.getElementById('t-del');
    if(delBtn)delBtn.addEventListener('click',()=>{if(!confirm(`「${m.origName}」を削除しますか？`))return;delete state.terminal[m.origName];saveTerminal();state.modal=null;showToast('削除しました');render();});
    const cancelBtn=document.getElementById('t-cancel');
    if(cancelBtn)cancelBtn.addEventListener('click',()=>{state.modal=null;render();});
  }
}

render();
</script>
