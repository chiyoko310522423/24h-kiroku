<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>24時間連絡体制 輪番表</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Hiragino Sans','Noto Sans JP',sans-serif;background:#f0f4f8;padding-bottom:60px;}

.header{background:linear-gradient(135deg,#0a1628,#0d3b7a);color:#fff;padding:18px 16px 14px;border-radius:0 0 20px 20px;margin-bottom:14px;}
.header h1{font-size:17px;font-weight:900;}
.header p{font-size:11px;opacity:.7;margin-top:3px;}

/* タブ */
.tabs{display:flex;gap:8px;padding:0 14px;margin-bottom:14px;}
.tab-btn{flex:1;padding:9px 4px;border:none;border-radius:12px;font-weight:700;font-size:12px;cursor:pointer;font-family:inherit;}
.tab-btn.active{background:#0d3b7a;color:#fff;box-shadow:0 4px 14px rgba(13,59,122,.4);}
.tab-btn.inactive{background:#fff;color:#64748b;box-shadow:0 1px 4px rgba(0,0,0,.06);}

/* 月ナビ */
.month-nav{display:flex;align-items:center;justify-content:space-between;padding:0 14px;margin-bottom:10px;}
.month-nav button{background:#0d3b7a;color:#fff;border:none;border-radius:10px;padding:8px 16px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
.month-nav button:disabled{opacity:.3;}
.month-title{font-size:18px;font-weight:900;color:#0a1628;}

.legend{display:flex;flex-wrap:wrap;gap:5px;padding:0 14px;margin-bottom:10px;}
.legend-item{font-size:10px;font-weight:700;border-radius:15px;padding:3px 10px;}

/* カレンダー */
.cal-wrap{padding:0 10px;}
table{width:100%;border-collapse:collapse;}
th{background:#0d3b7a;color:#fff;padding:7px 2px;font-size:12px;text-align:center;border:1px solid #1e4a8a;}
th.sun{background:#b91c1c;}
th.sat{background:#1d4ed8;}
td{border:1px solid #e2e8f0;padding:3px 2px;vertical-align:top;background:#fff;}
td.empty{background:#f8fafc;}
td.today-cell{border:2px solid #0d3b7a !important;}
td.sun-cell{background:#fff8f8;}
td.sat-cell{background:#f0f4ff;}

.day-num{font-size:13px;font-weight:800;text-align:center;margin-bottom:2px;}
.sun-num{color:#dc2626;}
.sat-num{color:#2563eb;}
.today-num{color:#0d3b7a;}

.staff-select{width:100%;font-size:9px;border:1px solid #e2e8f0;border-radius:5px;padding:2px 1px;font-family:inherit;cursor:pointer;font-weight:700;outline:none;}
.s-未設定{background:#fff;color:#94a3b8;}
.s-高橋{background:#f1f5f9;color:#374151;}
.s-酒井{background:#dbeafe;color:#1d4ed8;}
.s-小田{background:#dcfce7;color:#15803d;}
.s-加持{background:#fef3c7;color:#b45309;}
.s-三原{background:#fce7f3;color:#be185d;}

/* 集計タブ */
.summary-wrap{padding:0 14px;}
.summary-title{font-size:15px;font-weight:900;color:#0a1628;margin-bottom:12px;}

.staff-card{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,.06);}
.staff-name{font-size:15px;font-weight:900;margin-bottom:10px;}
.staff-total{font-size:20px;font-weight:900;color:#0d3b7a;margin-bottom:4px;}
.staff-total span{font-size:12px;color:#64748b;font-weight:400;}

.month-bars{margin-top:8px;}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.bar-label{font-size:10px;color:#64748b;min-width:50px;}
.bar-track{flex:1;background:#f1f5f9;border-radius:20px;height:16px;overflow:hidden;}
.bar-fill{height:100%;border-radius:20px;display:flex;align-items:center;padding-left:6px;}
.bar-val{font-size:9px;font-weight:700;color:#fff;white-space:nowrap;}

/* 年間集計テーブル */
.annual-table{width:100%;border-collapse:collapse;margin-top:14px;font-size:11px;}
.annual-table th{background:#0d3b7a;color:#fff;padding:6px 4px;text-align:center;border:1px solid #1e4a8a;}
.annual-table td{padding:5px 4px;text-align:center;border:1px solid #e2e8f0;background:#fff;}
.annual-table tr:nth-child(even) td{background:#f8fafc;}
.annual-table .total-row td{background:#f0f4f8;font-weight:900;}
.annual-table .staff-row th{background:#374151;}

/* ボタン */
.btn-row{display:flex;gap:8px;padding:12px 14px 0;}
.save-btn{flex:2;padding:12px 0;background:linear-gradient(135deg,#0a1628,#0d3b7a);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
.print-btn{flex:1;padding:12px 0;background:#059669;color:#fff;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}

.progress{padding:8px 14px 0;font-size:11px;color:#64748b;text-align:center;}
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);color:#fff;padding:9px 22px;border-radius:30px;font-weight:700;font-size:13px;z-index:500;pointer-events:none;white-space:nowrap;}

@media print {
  .tabs,.btn-row,.toast,.legend,.progress{display:none!important;}
  body{background:#fff;padding:0;}
  .header{border-radius:0;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  table{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .staff-select{-webkit-appearance:none;appearance:none;border:none!important;}
  .staff-card{box-shadow:none;border:1px solid #e2e8f0;}
}
</style>
</head>
<body>

<div class="header">
  <h1>📋 24時間連絡体制 輪番表</h1>
  <p>ケアプランセンター桃園　令和8年4月〜令和9年3月</p>
</div>

<div class="tabs">
  <button class="tab-btn active" id="tab-cal" onclick="switchTab('cal')">📅 輪番入力</button>
  <button class="tab-btn inactive" id="tab-sum" onclick="switchTab('sum')">📊 担当者別集計</button>
</div>

<!-- カレンダータブ -->
<div id="view-cal">
  <div class="legend">
    <span class="legend-item s-高橋">高橋</span>
    <span class="legend-item s-酒井">酒井</span>
    <span class="legend-item s-小田">小田</span>
    <span class="legend-item s-加持">加持</span>
    <span class="legend-item s-三原">三原</span>
  </div>

  <div class="month-nav">
    <button id="prev-btn">‹ 前月</button>
    <div class="month-title" id="month-title"></div>
    <button id="next-btn">次月 ›</button>
  </div>

  <div class="progress" id="progress"></div>

  <div class="cal-wrap">
    <table>
      <thead>
        <tr>
          <th class="sun">日</th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th class="sat">土</th>
        </tr>
      </thead>
      <tbody id="cal-body"></tbody>
    </table>
  </div>

  <div class="btn-row">
    <button class="save-btn" id="save-btn">💾 保存する</button>
    <button class="print-btn" onclick="window.print()">🖨️ 印刷</button>
  </div>
</div>

<!-- 集計タブ -->
<div id="view-sum" style="display:none;">
  <div class="summary-wrap">
    <div class="summary-title">👤 担当者別 当番日数集計</div>
    <div id="summary-content"></div>
  </div>
  <div class="btn-row">
    <button class="print-btn" style="flex:1;" onclick="window.print()">🖨️ 集計表を印刷</button>
  </div>
</div>

<div id="toast" class="toast" style="display:none;"></div>

<script>
const STAFF_NAMES = ['高橋ケアマネ','酒井ケアマネ','小田ケアマネ','加持ケアマネ','三原ケアマネ'];
const STAFF_ALL = ['未設定',...STAFF_NAMES];
const MONTHS_JP = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const STORAGE_KEY = 'rota-v2';

const STAFF_COLORS = {
  '高橋ケアマネ':'#94a3b8','酒井ケアマネ':'#3b82f6','小田ケアマネ':'#22c55e',
  '加持ケアマネ':'#f59e0b','三原ケアマネ':'#ec4899'
};

function dk(y,m,d){ return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }

let data = {};
try { data = JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}'); } catch {}

const months = [];
for (let y=2026;y<=2027;y++) for (let m=0;m<12;m++) {
  if (y===2026&&m<3) continue;
  if (y===2027&&m>2) break;
  months.push({y,m});
}

const now = new Date();
let idx = 0;
months.forEach(({y,m},i) => { if (y===now.getFullYear()&&m===now.getMonth()) idx=i; });

let currentTab = 'cal';

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('view-cal').style.display = tab==='cal'?'block':'none';
  document.getElementById('view-sum').style.display = tab==='sum'?'block':'none';
  document.getElementById('tab-cal').className = 'tab-btn '+(tab==='cal'?'active':'inactive');
  document.getElementById('tab-sum').className = 'tab-btn '+(tab==='sum'?'active':'inactive');
  if (tab==='sum') renderSummary();
}

function sc(staff){ return 's-'+staff.replace('ケアマネ',''); }

function updateProgress(y,m) {
  const lastDay = new Date(y,m+1,0).getDate();
  let filled = 0;
  for (let d=1;d<=lastDay;d++) {
    const v = data[dk(y,m,d)];
    if (v && v!=='未設定') filled++;
  }
  const pct = Math.round(filled/lastDay*100);
  document.getElementById('progress').textContent =
    `入力済み ${filled}/${lastDay}日（${pct}%）${filled===lastDay?'✅ 完了':''}`;
}

function renderCalendar() {
  const {y,m} = months[idx];
  document.getElementById('month-title').textContent = `令和${y-2018}年 ${MONTHS_JP[m]}`;
  document.getElementById('prev-btn').disabled = idx===0;
  document.getElementById('next-btn').disabled = idx===months.length-1;

  const firstDow = new Date(y,m,1).getDay();
  const lastDay = new Date(y,m+1,0).getDate();
  const tbody = document.getElementById('cal-body');
  tbody.innerHTML = '';

  let tr = document.createElement('tr');
  for (let i=0;i<firstDow;i++){
    const td=document.createElement('td'); td.className='empty'; tr.appendChild(td);
  }

  for (let d=1;d<=lastDay;d++) {
    const date = new Date(y,m,d);
    const dow = date.getDay();
    const isToday = now.getFullYear()===y&&now.getMonth()===m&&now.getDate()===d;
    const staff = data[dk(y,m,d)]||'未設定';

    const td = document.createElement('td');
    td.className = isToday?'today-cell':dow===0?'sun-cell':dow===6?'sat-cell':'';

    const numDiv = document.createElement('div');
    numDiv.className = 'day-num '+(dow===0?'sun-num':dow===6?'sat-num':isToday?'today-num':'');
    numDiv.textContent = d;
    td.appendChild(numDiv);

    const sel = document.createElement('select');
    sel.className = 'staff-select '+sc(staff);
    sel.dataset.dk = dk(y,m,d);
    STAFF_ALL.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s; opt.textContent = s.replace('ケアマネ','');
      if (s===staff) opt.selected = true;
      sel.appendChild(opt);
    });
    sel.addEventListener('change', () => {
      data[sel.dataset.dk] = sel.value;
      sel.className = 'staff-select '+sc(sel.value);
      updateProgress(y,m);
    });
    td.appendChild(sel);
    tr.appendChild(td);

    if (dow===6||d===lastDay) {
      if (dow!==6&&d===lastDay) for (let i=dow+1;i<=6;i++){
        const etd=document.createElement('td'); etd.className='empty'; tr.appendChild(etd);
      }
      tbody.appendChild(tr);
      tr = document.createElement('tr');
    }
  }
  updateProgress(y,m);
}

// ===== 集計 =====
const ONCALL_WEEKDAY = 1000;
const ONCALL_WEEKEND = 2000;

function isWeekend(y, m, d) {
  const dow = new Date(y, m, d).getDay();
  return dow === 0 || dow === 6; // 日曜or土曜
}

function calcSummary() {
  // { staffName: { total, weekday, weekend, months: [{total,weekday,weekend}x12] } }
  const result = {};
  STAFF_NAMES.forEach(s => {
    result[s] = {
      total: 0, weekday: 0, weekend: 0,
      months: new Array(12).fill(null).map(() => ({total:0, weekday:0, weekend:0}))
    };
  });

  months.forEach(({y,m}, mi) => {
    const lastDay = new Date(y,m+1,0).getDate();
    for (let d=1;d<=lastDay;d++) {
      const staff = data[dk(y,m,d)];
      if (staff && staff!=='未設定' && result[staff]) {
        const we = isWeekend(y, m, d);
        result[staff].months[mi].total++;
        result[staff].total++;
        if (we) { result[staff].months[mi].weekend++; result[staff].weekend++; }
        else     { result[staff].months[mi].weekday++; result[staff].weekday++; }
      }
    }
  });
  return result;
}

// 表示モード: 'total' | 'split'
let summaryMode = 'total';

function renderSummary() {
  const summary = calcSummary();

  // 全体の最大値（バーグラフ用）
  const maxMonthVal = Math.max(...STAFF_NAMES.flatMap(s => summary[s].months.map(m => m.total)), 1);

  let html = '';

  // モード切替ボタン
  html += `<div style="display:flex;gap:8px;margin-bottom:12px;">
    <button onclick="setSummaryMode('total')" id="mode-total"
      style="flex:1;padding:8px;border:none;border-radius:10px;font-weight:700;font-size:12px;cursor:pointer;font-family:inherit;
             background:${summaryMode==='total'?'#0d3b7a':'#fff'};color:${summaryMode==='total'?'#fff':'#64748b'};
             box-shadow:0 1px 4px rgba(0,0,0,.08);">
      📊 日数集計
    </button>
    <button onclick="setSummaryMode('split')" id="mode-split"
      style="flex:1;padding:8px;border:none;border-radius:10px;font-weight:700;font-size:12px;cursor:pointer;font-family:inherit;
             background:${summaryMode==='split'?'#0d3b7a':'#fff'};color:${summaryMode==='split'?'#fff':'#64748b'};
             box-shadow:0 1px 4px rgba(0,0,0,.08);">
      📅 平日／土日 内訳
    </button>
  </div>`;

  if (summaryMode === 'total') {
    // ===== 日数集計モード（従来表示）=====
    html += `<div style="background:#fff;border-radius:14px;padding:14px;margin-bottom:14px;box-shadow:0 1px 6px rgba(0,0,0,.06);overflow-x:auto;">`;
    html += `<div style="font-size:13px;font-weight:900;color:#0a1628;margin-bottom:10px;">📋 年間合計（令和8年4月〜令和9年3月）</div>`;
    html += `<table class="annual-table"><thead><tr><th>担当者</th>`;
    months.forEach(({y,m}) => { html += `<th>${y-2018}/${m+1}</th>`; });
    html += `<th style="background:#1e3a5f;">合計</th></tr></thead><tbody>`;

    STAFF_NAMES.forEach(s => {
      const d = summary[s];
      html += `<tr><td style="font-weight:700;text-align:left;padding-left:8px;">${s.replace('ケアマネ','')}</td>`;
      d.months.forEach(mv => { html += `<td>${mv.total||'-'}</td>`; });
      html += `<td style="font-weight:900;color:#0d3b7a;">${d.total}</td></tr>`;
    });

    const monthTotals = months.map((_,mi) => STAFF_NAMES.reduce((a,s)=>a+summary[s].months[mi].total,0));
    const grandTotal = STAFF_NAMES.reduce((a,s)=>a+summary[s].total,0);
    html += `<tr class="total-row"><td style="text-align:left;padding-left:8px;">合計</td>`;
    monthTotals.forEach(v => { html += `<td>${v||'-'}</td>`; });
    html += `<td>${grandTotal}</td></tr></tbody></table></div>`;

    // 担当者別カード（バーグラフ）
    STAFF_NAMES.forEach(s => {
      const d = summary[s];
      const color = STAFF_COLORS[s];
      html += `<div class="staff-card" style="border-left:4px solid ${color};">
        <div class="staff-name" style="color:${color};">${s}</div>
        <div class="staff-total">${d.total}<span> 日（年間）</span></div>
        <div class="month-bars">`;
      months.forEach(({y,m},mi) => {
        const v = d.months[mi].total;
        const monthDays = new Date(y,m+1,0).getDate();
        const barW = maxMonthVal > 0 ? Math.round(v/maxMonthVal*100) : 0;
        html += `<div class="bar-row">
          <div class="bar-label">R${y-2018}.${m+1}月</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${barW}%;background:${color};min-width:${v>0?'24px':'0'};">
              ${v>0?`<span class="bar-val">${v}日</span>`:''}
            </div>
          </div>
          <div style="font-size:10px;color:#64748b;min-width:36px;text-align:right;">${monthDays}日中</div>
        </div>`;
      });
      html += `</div></div>`;
    });

  } else {
    // ===== 平日／土日内訳モード =====
    // 凡例
    html += `<div style="display:flex;gap:8px;margin-bottom:10px;font-size:11px;font-weight:700;">
      <span style="background:#e0f2fe;color:#0369a1;padding:3px 10px;border-radius:20px;">平日</span>
      <span style="background:#fce7f3;color:#be185d;padding:3px 10px;border-radius:20px;">土日</span>
    </div>`;

    // 年間集計テーブル
    html += `<div style="background:#fff;border-radius:14px;padding:14px;margin-bottom:14px;box-shadow:0 1px 6px rgba(0,0,0,.06);overflow-x:auto;">`;
    html += `<div style="font-size:13px;font-weight:900;color:#0a1628;margin-bottom:10px;">📋 年間合計（令和8年4月〜令和9年3月）</div>`;
    html += `<table class="annual-table"><thead><tr>
      <th>担当者</th><th>平日日数</th><th>土日日数</th><th style="background:#1e3a5f;">合計日数</th>
    </tr></thead><tbody>`;

    let grandWd=0, grandWe=0, grandTotal2=0;
    STAFF_NAMES.forEach(s => {
      const d = summary[s];
      grandWd += d.weekday; grandWe += d.weekend; grandTotal2 += d.total;
      html += `<tr>
        <td style="font-weight:700;text-align:left;padding-left:8px;">${s.replace('ケアマネ','')}</td>
        <td style="color:#0369a1;font-weight:700;">${d.weekday||'-'}</td>
        <td style="color:#be185d;font-weight:700;">${d.weekend||'-'}</td>
        <td style="font-weight:900;color:#0d3b7a;">${d.total||'-'}</td>
      </tr>`;
    });
    html += `<tr class="total-row">
      <td style="text-align:left;padding-left:8px;">合計</td>
      <td style="color:#0369a1;font-weight:900;">${grandWd||'-'}</td>
      <td style="color:#be185d;font-weight:900;">${grandWe||'-'}</td>
      <td style="font-weight:900;">${grandTotal2||'-'}</td>
    </tr></tbody></table></div>`;

    // 担当者別カード（平日・土日内訳）
    STAFF_NAMES.forEach(s => {
      const d = summary[s];
      const color = STAFF_COLORS[s];
      html += `<div class="staff-card" style="border-left:4px solid ${color};">
        <div class="staff-name" style="color:${color};">${s}</div>
        <div style="display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap;">
          <div>
            <div style="font-size:10px;color:#64748b;font-weight:700;">平日</div>
            <div style="font-size:20px;font-weight:900;color:#0369a1;">${d.weekday}<span style="font-size:11px;color:#64748b;font-weight:400;"> 日</span></div>
          </div>
          <div style="width:1px;background:#e2e8f0;"></div>
          <div>
            <div style="font-size:10px;color:#64748b;font-weight:700;">土日</div>
            <div style="font-size:20px;font-weight:900;color:#be185d;">${d.weekend}<span style="font-size:11px;color:#64748b;font-weight:400;"> 日</span></div>
          </div>
        </div>
        <div class="month-bars">`;

      months.forEach(({y,m},mi) => {
        const mv = d.months[mi];
        const barWd = maxMonthVal > 0 ? Math.round(mv.weekday/maxMonthVal*100) : 0;
        const barWe = maxMonthVal > 0 ? Math.round(mv.weekend/maxMonthVal*100) : 0;
        html += `<div class="bar-row" style="align-items:center;">
          <div class="bar-label">R${y-2018}.${m+1}月</div>
          <div style="flex:1;">
            ${mv.weekday > 0 ? `<div style="display:flex;align-items:center;gap:4px;margin-bottom:2px;">
              <div style="width:${barWd}%;background:#0ea5e9;border-radius:20px;height:13px;min-width:24px;display:flex;align-items:center;padding-left:5px;">
                <span style="font-size:9px;font-weight:700;color:#fff;">平${mv.weekday}</span>
              </div>
            </div>` : ''}
            ${mv.weekend > 0 ? `<div style="display:flex;align-items:center;gap:4px;">
              <div style="width:${barWe}%;background:#ec4899;border-radius:20px;height:13px;min-width:24px;display:flex;align-items:center;padding-left:5px;">
                <span style="font-size:9px;font-weight:700;color:#fff;">土日${mv.weekend}</span>
              </div>
            </div>` : ''}
            ${mv.total === 0 ? `<div style="font-size:9px;color:#cbd5e1;">-</div>` : ''}
          </div>
        </div>`;
      });

      html += `</div></div>`;
    });
  }

  document.getElementById('summary-content').innerHTML = html;
}

function setSummaryMode(mode) {
  summaryMode = mode;
  renderSummary();
}

// イベント
document.getElementById('save-btn').addEventListener('click', () => {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  showToast('💾 保存しました！');
});
document.getElementById('prev-btn').addEventListener('click', () => {
  if (idx>0){ idx--; renderCalendar(); window.scrollTo(0,0); }
});
document.getElementById('next-btn').addEventListener('click', () => {
  if (idx<months.length-1){ idx++; renderCalendar(); window.scrollTo(0,0); }
});

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.background='#0d3b7a'; t.style.display='block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.style.display='none', 2200);
}

renderCalendar();
</script>
</body>
